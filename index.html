<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1280" />
    <title>Sistem Pendaftaran Mahasiswa Baru — Universitas Nusantara</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet"/>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html { min-width: 1280px; scroll-behavior: smooth; }
      body { background: #FAF7F2; font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; color: #2C2C2C; }
      #root { min-height: 100vh; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #E8E2D9; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #B0A99A; }
      input, select, textarea, button { font-family: inherit; }
      ::placeholder { color: #B0A99A; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
