<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=1280"/>
  <title>SPMB Universitas Nusantara — Print Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #888; font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    ::placeholder { color: #B0A99A; }
    input, select, textarea, button { font-family: inherit; }
    ::-webkit-scrollbar { display: none; }

    /* ── Print page wrapper ── */
    .pp-outer {
      width: 1122px;       /* A4 landscape at 96dpi */
      height: 794px;
      overflow: hidden;
      background: #FAF7F2;
      position: relative;
      margin: 20px auto;
      box-shadow: 0 4px 32px rgba(0,0,0,0.3);
    }
    .pp-inner {
      width: 1280px;
      height: 907px;       /* 794 / 0.875 */
      transform: scale(0.875);
      transform-origin: top left;
      overflow: hidden;
      pointer-events: none;
    }

    /* ── Page label (screen only) ── */
    .pp-label {
      background: #2C2420;
      color: rgba(255,255,255,0.7);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      padding: 6px 16px;
      text-transform: uppercase;
    }

    /* ── Print media ── */
    @media print {
      @page { size: A4 landscape; margin: 0; }
      body { background: white; }

      .pp-outer {
        width: 297mm;
        height: 210mm;
        margin: 0;
        box-shadow: none;
        break-before: page;
        page-break-before: always;
      }
      .pp-outer:first-of-type {
        break-before: auto;
        page-break-before: auto;
      }
      .pp-inner {
        width: 1346px;      /* 297mm at 96dpi ≈ 1122px; 1122/0.834 ≈ 1346 at slightly tighter scale */
        height: 954px;      /* 210mm at 96dpi ≈ 794px; 794/0.834 ≈ 952 */
        transform: scale(0.834);
      }
      .pp-label { display: none; }
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      color-adjust: exact;
    }
  </style>

  <!-- Components -->
  <script type="text/babel" src="shared-desktop.jsx"></script>
  <script type="text/babel" src="desktop-pages-1-2.jsx"></script>
  <script type="text/babel" src="desktop-pages-3-4.jsx"></script>
  <script type="text/babel" src="desktop-pages-5-6.jsx"></script>
  <script type="text/babel" src="desktop-pages-7-8.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const {
      C, T, Sidebar,
      PageLanding, PageInfo, PageAuth, PageDashboard,
      PageForm, PageUpload, PagePayment, PageStatus,
    } = window;

    const noop = () => {};
    const DEMO_STEP = 2;
    const DEMO_FORM = {
      nama: 'Stefanny Aulia', nik: '3271012345678901',
      ttl: 'Yogyakarta, 14 Februari 2007', jk: 'P', agama: 'islam',
      hp: '08123456789', alamat: 'Jl. Cendana No. 12, Sleman, Yogyakarta',
      namaSekolah: 'SMA Negeri 1 Yogyakarta', kotaSekolah: 'Yogyakarta',
      jurusan: 'IPA', tahunLulus: '2026', npsn: '20403420',
      prodi1: 'teknik-informatika', prodi2: 'sistem-informasi', jalur: 'reguler',
    };
    const DEMO_UPLOADS = { ijazah: 'uploaded', pasfoto: 'verified', kk: 'empty', skl: 'empty' };

    const sharedProps = {
      navigate: noop,
      registrationStep: DEMO_STEP,
      formData: DEMO_FORM,
      setFormData: noop,
      uploadState: DEMO_UPLOADS,
      setUploadState: noop,
      paymentMethod: 'va',
      setPaymentMethod: noop,
      onStepComplete: noop,
      onLogin: noop,
    };

    // Sidebar wrapper for post-login pages
    function WithSidebar({ children }) {
      return (
        <div style={{ display: 'flex', height: 907 }}>
          <Sidebar
            navigate={noop}
            page="dashboard"
            registrationStep={DEMO_STEP}
            onLogout={noop}
          />
          <div style={{ marginLeft: 256, flex: 1, background: C.bg, overflowY: 'hidden' }}>
            {children}
          </div>
        </div>
      );
    }

    const pages = [
      {
        label: '01 — Landing',
        content: <PageLanding navigate={noop} />,
        hasSidebar: false,
      },
      {
        label: '02 — Info Pendaftaran',
        content: <PageInfo navigate={noop} />,
        hasSidebar: false,
      },
      {
        label: '03 — Daftar / Masuk Akun',
        content: <PageAuth navigate={noop} onLogin={noop} />,
        hasSidebar: false,
      },
      {
        label: '04 — Dashboard',
        content: <PageDashboard {...sharedProps} />,
        hasSidebar: true,
      },
      {
        label: '05 — Formulir Data Diri',
        content: <PageForm {...sharedProps} />,
        hasSidebar: true,
      },
      {
        label: '06 — Upload Dokumen',
        content: <PageUpload {...sharedProps} />,
        hasSidebar: true,
      },
      {
        label: '07 — Pembayaran',
        content: <PagePayment {...sharedProps} />,
        hasSidebar: true,
      },
      {
        label: '08 — Status & Pengumuman',
        content: <PageStatus {...sharedProps} />,
        hasSidebar: true,
      },
    ];

    function PrintApp() {
      return (
        <div>
          {pages.map((pg, i) => (
            <div key={i}>
              <div className="pp-label">{pg.label}</div>
              <div className="pp-outer">
                <div className="pp-inner">
                  {pg.hasSidebar
                    ? <WithSidebar>{pg.content}</WithSidebar>
                    : pg.content
                  }
                </div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PrintApp />);

    // Auto-print after fonts + Babel settle
    document.fonts.ready.then(() => {
      setTimeout(() => { window.print(); }, 700);
    });
  </script>
</body>
</html>
